<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle of the Bands</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
}

/* Applies to all sections */
section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px;
}

/* Section 1 */
#section1{
    background:black;
}

/* Section 2 */
#section2{
    background:black;
}

/* Section 3 */
#section3{
    background:black;
}

/* Section 4 */
#section4{
    background:black;
}

/* Section 5 */
#section5{
    background:black;
}

img{
    max-width:90%;
    border-radius:15px;
}

#section1{
    position:relative;
    width:100%;
    height:100vh; /* full screen */
    overflow:hidden;
}

.background,
.top{
    position:absolute;

    width:90%;
    height:auto;

    left:50%;
    transform:translateX(-50%);
}

.background{
    z-index:1;
}

.disc{
    z-index:5;
}

.top{
    z-index:10;
}

/* Shared disc settings */
.disc{
    position:absolute;

    transition:transform 0.1s linear;

    z-index:5;
}

/* Easily adjustable */

.disc1{
    width:694px;

    top:-320px;
    left:-250px;
}

.disc2{
    width:300px;

    top:50px;
    left:120px;
}

.disc3{
    width:500px;

    top:-150px;
    right:10px;
}

/* ==========================
   SECTION 2
========================== */

#section2{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

/* Same sizing as Section 1 */

.background2,
.top2{
    position:absolute;

    width:90%;
    height:auto;

    left:50%;
    transform:translateX(-50%);
}

/* Layers */

.background2{
    z-index:1;
}

.popups{
    position:absolute;
    width:100%;
    height:100%;

    z-index:5;
}


.top2{
    z-index:10;
    pointer-events:none;
}

/* ==========================
   POPUPS
========================== */

.popup{

    opacity:0;

    transform:translateY(100px) scale(0.8);

    transition:
        opacity 0.8s ease,
        transform 0.8s ease;

    cursor:pointer;
}

.popup{
    height:auto;
}

/* Popup 1 */
.popup1{
    position:absolute;

    width:477px;
    height:346px;

    left:330px;
    top:100px;

    object-fit:contain;
}

/* Popup 2 */
.popup2{
    position:absolute;

    width:172px;
    height:315px;

    right:270px;
    top:185px;

    object-fit:contain;
}



/* Appears on scroll */

.popup.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

/* Hover effect */

.popup:hover{
    transform:translateY(0) scale(1.15);
    /* Change 1.15 to adjust hover size */
}

/* ==========================
   SECTION 3
========================== */

#section3{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

/* Same sizing as Sections 1 & 2 */

.background3,
.top3{
    position:absolute;

    width:90%;
    height:auto;

    left:50%;
    transform:translateX(-50%);
}

/* Layers */

.background3{
    z-index:1;
}

.popup-container3{
    position:absolute;

    width:100%;
    height:100%;

    z-index:5;
}

.top3{
    z-index:10;
    pointer-events:none;
}

/* ==========================
   SECTION 3 POPUP
========================== */

.popup3{

    position:absolute;

    width:540px; /* CHANGE SIZE */

    left:400px;  
    top:0px;   

    opacity:0;

    transform:translateY(100px) scale(0.8);

    transition:
        opacity 0.8s ease,
        transform 0.8s ease;

    cursor:pointer;
}

/* Appear Animation */

.popup3.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

/* Hover Animation */

.popup3:hover{
    transform:translateY(0) scale(1.15);
}

/* ==========================
   SECTION 3 DISC
========================== */

.disc4{

    position:absolute;

    width:350px; /* CHANGE SIZE */

    left:120px;  /* CHANGE POSITION */
    top:150px;   /* CHANGE POSITION */

    z-index:6;
}

/* ==========================
   SECTION 4
========================== */

#section4{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

/* Same sizing as other sections */

.background4,
.top4{
    position:absolute;

    width:90%;
    height:auto;

    left:50%;
    transform:translateX(-50%);
}

/* Layers */

.background4{
    z-index:1;
}

.popup-container4{
    position:absolute;

    width:100%;
    height:100%;

    z-index:5;
}

.top4{
    z-index:10;
    pointer-events:none;
}

/* ==========================
   SECTION 4 POPUP
========================== */

.popup4{

    position:absolute;

    width:1000px; /* CHANGE SIZE */

    left:170px;  /* CHANGE POSITION */
    top:10px;   /* CHANGE POSITION */

    opacity:0;

    transform:translateY(100px) scale(0.8);

    transition:
        opacity 0.8s ease,
        transform 0.8s ease;

    cursor:pointer;
}

/* Appear Animation */

.popup4.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

/* Hover Animation */

.popup4:hover{
    transform:translateY(0) scale(1.15);
}

.disc6{

    position:absolute;

    width:400px; /* CHANGE SIZE */

    left:0px;  /* CHANGE POSITION */
    bottom:-100px;   /* CHANGE POSITION */

    z-index:100;
}

/* ==========================
   SECTION 5
========================== */

#section5{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

/* Same sizing as other sections */

.background5,
.top5{
    position:absolute;

    width:90%;
    height:auto;

    left:50%;
    transform:translateX(-50%);
}

/* Layers */

.background5{
    z-index:1;
}

.popup-container5{
    position:absolute;

    width:100%;
    height:100%;

    z-index:5;
}

.disc5{
    z-index:6;
}

.top5{
    z-index:10;
    pointer-events:none;
}

/* ==========================
   SECTION 5 DISC
========================== */

.disc5{

    position:absolute;

    width:800px; /* CHANGE SIZE */

    right:-150px;  /* CHANGE POSITION */
    top:-300px;   /* CHANGE POSITION */

    transition:transform 0.1s linear;
}
/* ==========================
   SECTION 5 DISC
========================== */

.disc5{

    position:absolute;

    width:700px;

    right:-50px;
    top:-50px;

    z-index:2;   /* CHANGE THIS */

    transition:transform 0.1s linear;
}

/* ==========================
   SECTION 5 POPUPS
========================== */

.popup5{

    position:absolute;

    opacity:0;

    transform:translateY(100px) scale(0.8);

    transition:
        opacity 0.8s ease,
        transform 0.8s ease;

    cursor:pointer;
}

/* Appear Animation */

.popup5.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

/* Hover Animation */

.popup5:hover{
    transform:translateY(0) scale(1.15);
}

/* Popup 1 */

.popup5-1{

    width:410px;

    left:150px;
    top:20px;

    z-index:7;   /* CHANGE THIS */
}

/* Popup 2 */

.popup5-2{

    width:229px;

    left:500px;
    top:220px;

    z-index:11;   /* CHANGE THIS */
}

/* Popup 3 */

.popup5-3{

    width:234px;

    left:850px;
    bottom:20px;

    z-index:10;   /* CHANGE THIS */
}

/* Popup 4 */

.popup5-4{

    width:194px;

    right:360px;
    top:170px;

    z-index:8;  /* CHANGE THIS */
}

/* Popup 5 */

.popup5-5{

    width:194px;

    right:170px;
    top:30px;

    z-index:9;  /* CHANGE THIS */
}

</style>
</head>
<body>

<section id="section1">

    <!-- Background -->
    <img src="1background.jpg" class="background">

    <!-- Rotating discs -->
    <img src="1disc1.png" class="disc disc1">
    <img src="1disc2.png" class="disc disc2">
    <img src="1disc3.png" class="disc disc3">

    <!-- Top decorations -->
    <img src="1top.png" class="top">

</section>

<section id="section2">

    <!-- Background -->
    <img src="2background.jpg" class="background2">

    <!-- Popups -->
    <div class="popups">
        <img src="2popup1.png" class="popup popup1">
        <img src="2popup2.png" class="popup popup2">
    </div>

    <!-- Top Decorations -->
    <img src="2top.png" class="top2">

</section>

<section id="section3">

    <!-- Background -->
    <img src="3background.jpg" class="background3">

    <!-- Popup -->
    <div class="popup-container3">
        <img src="3popup.png" class="popup popup3">
    </div>

    <!-- Rotating Disc -->
    <img src="3disc.png" class="disc4">

    <!-- Top Decorations -->
    <img src="3top.png" class="top3">

</section>

<section id="section4">

    <!-- Background -->
    <img src="4background.jpg" class="background4">

    <!-- Popup -->
    <div class="popup-container4">
        <img src="4popup.png" class="popup4">
    </div>

    <!-- Top Decorations -->
    <img src="4top.png" class="top4">

    <!-- Rotating Disc -->
    <img src="4disc.png" class="disc6">

</section>

<section id="section5">

    <!-- Background -->
    <img src="5background.jpg" class="background5">

    <!-- Popups -->
    <div class="popup-container5">

        <img src="5popup1.png" class="popup5 popup5-1">
        <img src="5popup2.png" class="popup5 popup5-2">
        <img src="5popup3.png" class="popup5 popup5-3">
        <img src="5popup4.png" class="popup5 popup5-4">
        <img src="5popup5.png" class="popup5 popup5-5">

    </div>

    <!-- Rotating Disc -->
    <img src="5disc.png" class="disc5">

    <!-- Top Decorations -->
    <img src="5top.png" class="top5">

</section>

<script>

window.addEventListener("scroll", () => {

    let scrollAmount = window.scrollY;

    document.querySelector(".disc1").style.transform =
        `rotate(${scrollAmount * 0.2}deg)`;

    document.querySelector(".disc2").style.transform =
        `rotate(${scrollAmount * -0.3}deg)`;

    document.querySelector(".disc3").style.transform =
        `rotate(${scrollAmount * 0.15}deg)`;

    document.querySelector(".disc4").style.transform =
        `rotate(${scrollAmount * 0.25}deg)`;

    document.querySelector(".disc5").style.transform =
        `rotate(${scrollAmount * 0.2}deg)`;

    document.querySelector(".disc6").style.transform =
        `rotate(${scrollAmount * 0.2}deg)`;

});

/* ==========================
   SECTION 2 POPUP APPEAR
========================== */

const section2 = document.getElementById("section2");
const popups = document.querySelectorAll(".popup");

window.addEventListener("scroll", () => {

    const rect = section2.getBoundingClientRect();

    if(rect.top < window.innerHeight - 200){

        popups.forEach(popup => {
            popup.classList.add("show");
        });

    }

});

/* ==========================
   SECTION 3 POPUP APPEAR
========================== */

const section3 = document.getElementById("section3");
const popup3 = document.querySelector(".popup3");

window.addEventListener("scroll", () => {

    const rect = section3.getBoundingClientRect();

    if(rect.top < window.innerHeight - 200){

        popup3.classList.add("show");

    }

});

/* ==========================
   SECTION 4 POPUP APPEAR
========================== */

const section4 = document.getElementById("section4");
const popup4 = document.querySelector(".popup4");

window.addEventListener("scroll", () => {

    const rect = section4.getBoundingClientRect();

    if(rect.top < window.innerHeight - 200){

        popup4.classList.add("show");

    }

});

/* ==========================
   SECTION 5 POPUP APPEAR
========================== */

const section5 = document.getElementById("section5");
const popups5 = document.querySelectorAll(".popup5");

window.addEventListener("scroll", () => {

    const rect = section5.getBoundingClientRect();

    if(rect.top < window.innerHeight - 200){

        popups5.forEach(popup => {
            popup.classList.add("show");
        });

    }

});
</script>

</body>
</html>
